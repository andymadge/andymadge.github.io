<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1976d2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1565c0;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#bgGradient)"/>

  <!-- Waveform visualization -->
  <g opacity="0.3" fill="#fff">
    <rect x="40" y="180" width="4" height="40" rx="2"/>
    <rect x="50" y="160" width="4" height="80" rx="2"/>
    <rect x="60" y="140" width="4" height="120" rx="2"/>
    <rect x="70" y="170" width="4" height="60" rx="2"/>
    <rect x="80" y="150" width="4" height="100" rx="2"/>
    <rect x="90" y="130" width="4" height="140" rx="2"/>
    <rect x="100" y="110" width="4" height="180" rx="2"/>
    <rect x="110" y="140" width="4" height="120" rx="2"/>
    <rect x="120" y="160" width="4" height="80" rx="2"/>
    <rect x="130" y="150" width="4" height="100" rx="2"/>
    <rect x="140" y="120" width="4" height="160" rx="2"/>
    <rect x="150" y="170" width="4" height="60" rx="2"/>
    <rect x="160" y="130" width="4" height="140" rx="2"/>
    <rect x="170" y="180" width="4" height="40" rx="2"/>
    <rect x="180" y="140" width="4" height="120" rx="2"/>
    <rect x="190" y="100" width="4" height="200" rx="2"/>
    <rect x="200" y="160" width="4" height="80" rx="2"/>
    <rect x="210" y="120" width="4" height="160" rx="2"/>
    <rect x="220" y="150" width="4" height="100" rx="2"/>
    <rect x="230" y="170" width="4" height="60" rx="2"/>
    <rect x="240" y="140" width="4" height="120" rx="2"/>
    <rect x="250" y="110" width="4" height="180" rx="2"/>
    <rect x="260" y="130" width="4" height="140" rx="2"/>
    <rect x="270" y="160" width="4" height="80" rx="2"/>
    <rect x="280" y="150" width="4" height="100" rx="2"/>
    <rect x="290" y="140" width="4" height="120" rx="2"/>
    <rect x="300" y="170" width="4" height="60" rx="2"/>
    <rect x="310" y="150" width="4" height="100" rx="2"/>
    <rect x="320" y="160" width="4" height="80" rx="2"/>
    <rect x="330" y="140" width="4" height="120" rx="2"/>
    <rect x="340" y="130" width="4" height="140" rx="2"/>
    <rect x="350" y="180" width="4" height="40" rx="2"/>
  </g>

  <!-- Headphones icon -->
  <g fill="#fff" opacity="0.9" transform="translate(200, 200)">
    <!-- Circle outline -->
    <circle cx="0" cy="0" r="60" fill="none" stroke="#fff" stroke-width="3"/>

    <!-- Headphone arc -->
    <path d="M -35,-10 Q -35,-45 0,-45 Q 35,-45 35,-10"
          fill="none" stroke="#fff" stroke-width="6" stroke-linecap="round"/>

    <!-- Left ear cup -->
    <rect x="-45" y="-5" width="12" height="25" rx="3" fill="#fff"/>

    <!-- Right ear cup -->
    <rect x="33" y="-5" width="12" height="25" rx="3" fill="#fff"/>

    <!-- DJ text -->
    <text x="0" y="35" font-family="Arial, sans-serif" font-size="24"
          font-weight="bold" fill="#fff" text-anchor="middle">MIX</text>
  </g>
</svg>
