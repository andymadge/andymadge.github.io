---
layout: single
---

<!-- Audio Player Integration -->
{% include audio-player.html %}

<!-- Mix Content (description, tracklist, etc.) -->
<div id="mix-content">
{{ content }}
</div>

<!-- Audio Player Initialization Script -->
<script src="{{ '/assets/js/audio-player.js' | relative_url }}"></script>
<script src="{{ '/assets/js/track-highlighter.js' | relative_url }}"></script>
<script src="{{ '/assets/js/playback-persistence.js' | relative_url }}"></script>
<script>
(async function() {
  try {
    // Get configuration from page front matter
    const config = {
      containerId: 'waveform',
      audioUrl: '{{ page.audio_url }}',
      waveformUrl: '{% if page.waveform_file %}/assets/waveforms/{{ page.waveform_file }}{% endif %}',
      duration: {{ page.duration_seconds | default: 0 }},
      mixId: '{{ page.slug | default: page.title | slugify }}',
      mixTitle: '{{ page.title | escape }}'
    };

    // Initialize audio player
    const player = await AudioPlayer.init(config);

    // Load saved playback position
    const savedPosition = PlaybackPersistence.getPosition(config.mixId);
    if (savedPosition && savedPosition.position > 5) {
      console.log(`Restoring playback position: ${formatTime(savedPosition.position)}`);
      player.seekTo(savedPosition.position);
    }

    // Set up position persistence
    let saveThrottle = null;
    const savePosition = () => {
      const position = player.getCurrentTime();
      const duration = player.getDuration();
      PlaybackPersistence.savePosition(config.mixId, position, duration, config.mixTitle);
    };

    // Save position periodically during playback (throttled to every 10 seconds)
    player.on('timeupdate', () => {
      if (!saveThrottle) {
        saveThrottle = setTimeout(() => {
          savePosition();
          saveThrottle = null;
        }, 10000); // 10 seconds
      }
    });

    // Save immediately on pause
    player.on('pause', () => {
      savePosition();
    });

    // Save on page unload
    window.addEventListener('beforeunload', () => {
      savePosition();
    });

    // Wire up UI controls
    const playPauseBtn = document.getElementById('play-pause-btn');
    const playIcon = document.getElementById('play-icon');
    const pauseIcon = document.getElementById('pause-icon');
    const currentTimeSpan = document.getElementById('current-time');
    const totalTimeSpan = document.getElementById('total-time');
    const volumeSlider = document.getElementById('volume-slider');
    const volumeLabel = document.getElementById('volume-label');

    // Play/Pause button
    playPauseBtn.addEventListener('click', () => {
      if (player.isPlaying()) {
        player.pause();
      } else {
        player.play();
      }
    });

    // Update play/pause button state
    player.on('play', () => {
      playIcon.style.display = 'none';
      pauseIcon.style.display = 'inline';
    });

    player.on('pause', () => {
      playIcon.style.display = 'inline';
      pauseIcon.style.display = 'none';
    });

    // Update time display
    player.on('timeupdate', (currentTime) => {
      currentTimeSpan.textContent = formatTime(currentTime);
    });

    // Set total time when ready
    totalTimeSpan.textContent = formatTime(player.getDuration());

    // Volume control
    volumeSlider.addEventListener('input', (e) => {
      const volume = e.target.value / 100;
      player.wavesurfer.setVolume(volume);
      volumeLabel.textContent = `🔊 ${e.target.value}%`;
    });

    // Set initial volume
    player.wavesurfer.setVolume(volumeSlider.value / 100);

    // Error handling
    player.on('error', (error) => {
      console.error('Audio playback error:', error);
      showError('Failed to load or play the audio. Please check your internet connection and try again.');
    });

    // Store player globally for debugging
    window.mixPlayer = player;

    // Format tracklist
    formatTracklist();

    // Initialize track highlighter (after tracklist is formatted)
    const highlighter = TrackHighlighter.init(player);
    window.mixHighlighter = highlighter;

  } catch (error) {
    console.error('Failed to initialize audio player:', error);
    showError('Failed to initialize the audio player. The audio file may be unavailable or in an unsupported format.');
  }
})();

/**
 * Parse and format tracklist from content
 */
function formatTracklist() {
  const content = document.getElementById('mix-content');
  if (!content) return;

  // Find all paragraphs in the content
  const paragraphs = content.querySelectorAll('p');

  paragraphs.forEach(p => {
    const text = p.textContent;

    // Check if this paragraph contains tracklist entries
    // Pattern: [HH:MM:SS] Artist - Title
    const trackPattern = /\[(\d{2}:\d{2}:\d{2})\]\s+(.+?)\s+-\s+(.+)/;

    if (trackPattern.test(text)) {
      // This paragraph contains tracklist entries - split into lines
      const lines = text.split(/\[(?=\d{2}:\d{2}:\d{2}\])/);

      // Create a proper list
      const ul = document.createElement('ul');
      ul.className = 'tracklist-items';

      lines.forEach(line => {
        if (!line.trim()) return;

        // Add opening bracket back if it was split
        const fullLine = line.startsWith('[') ? line : '[' + line;
        const match = fullLine.match(/\[(\d{2}:\d{2}:\d{2})\]\s+(.+)/);

        if (match) {
          const li = document.createElement('li');
          li.setAttribute('data-timestamp', match[1]);

          const timestampSpan = document.createElement('span');
          timestampSpan.className = 'timestamp';
          timestampSpan.textContent = `[${match[1]}]`;

          const artistTitleSpan = document.createElement('span');
          artistTitleSpan.className = 'artist-title';
          artistTitleSpan.textContent = match[2].trim();

          li.appendChild(timestampSpan);
          li.appendChild(document.createTextNode(' '));
          li.appendChild(artistTitleSpan);

          ul.appendChild(li);
        }
      });

      // Replace the paragraph with the formatted list
      if (ul.children.length > 0) {
        p.replaceWith(ul);
      }
    }
  });
}
</script>
