{% if page.mix_image %}
<div class="mix-image-section">
  {% if page.mix_image_caption %}
    <p class="mix-image-caption">{{ page.mix_image_caption }}</p>
  {% endif %}
  <a href="{{ page.mix_image | relative_url }}" target="_blank" rel="noopener">
    <img src="{{ page.mix_image | relative_url }}"
         alt="{{ page.mix_image_caption | default: 'Mix production screenshot' }}"
         class="mix-content-image">
  </a>
</div>
<script>
  // The theme's main.min.js (loaded after this script) binds Magnific Popup to
  // all a[href$='.png'] etc. using the namespace 'click.magnificPopup'.
  // We must wait until window load — by which point all scripts have executed and
  // Magnific Popup is initialised — before unbinding.
  window.addEventListener('load', function() {
    var link = document.querySelector('.mix-image-section a');
    if (link && window.jQuery) {
      jQuery(link).off('click.magnificPopup').removeClass('image-popup');
    }
  });
</script>
{% endif %}
