services:
  jekyll:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/site
      - bundle:/usr/local/bundle  # gems cached in a Docker volume (separate from host vendor/bundle)
    ports:
      - "4000:4000"
      - "35729:35729"  # LiveReload
    environment:
      BUNDLE_PATH: /usr/local/bundle  # overrides .bundle/config so host and container gems stay separate
      JEKYLL_ENV: development
      JEKYLL_EXTRA_ARGS: ""  # change to "--drafts" to preview draft posts
    working_dir: /site
    # --force_polling: required on macOS/Windows where Docker volumes don't support inotify
    command: >-
      bash -c "bundle install &&
      bundle exec jekyll serve
      --host 0.0.0.0
      --livereload
      --force_polling
      $JEKYLL_EXTRA_ARGS"

volumes:
  bundle:
